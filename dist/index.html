t's a feeling that stays with you forever.",longDescription:"The Maasai Mara National Reserve is Kenya's most celebrated wildlife sanctuary, a vast expanse of rolling grasslands where the drama of the wild unfolds every single day. Here, you'll witness the thundering hooves of the Great Migration, the silent stalk of a leopard at dusk, and the tender moments of an elephant family at dawn. The Mara is more than a safari — it's the heartbeat of Africa itself.",duration:"4 Days / 3 Nights",price:"From $1,450",priceNote:"per person sharing",highlights:["Great Migration viewing","Big Five encounters","Maasai cultural visit","Sundowner experiences","Hot air balloon safari (optional)","Night game drives"],inclusions:["Park entry fees","Professional safari guide","Safari vehicle","Full board accommodation","Airport/hotel transfers","Drinking water on safari"],itinerary:[{day:"Day 1",title:"Nairobi to Maasai Mara",description:"Depart Nairobi early morning, arriving at the Mara in time for an afternoon game drive as the savannah comes alive with golden light."},{day:"Day 2",title:"Full Day Safari",description:"A full day exploring the Mara's vast plains. Track the Big Five, witness river crossings, and discover hidden valleys teeming with wildlife."},{day:"Day 3",title:"Cultural & Wildlife",description:"Morning game drive followed by a visit to a Maasai village. Experience traditional dances, learn about ancient customs, and enjoy a spectacular sunset."},{day:"Day 4",title:"Final Drive & Return",description:"An early morning game drive captures the magic of dawn on the savannah. Return to Nairobi with memories of a lifetime."}],images:["https://images.pexels.com/photos/23886628/pexels-photo-23886628.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=800&w=1200","https://images.pexels.com/photos/31055420/pexels-photo-31055420.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=800&w=1200","https://images.pexels.com/photos/33720956/pexels-photo-33720956.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=800&w=1200","https://images.pexels.com/photos/15815055/pexels-photo-15815055.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=800&w=1200"],activities:["Game drives","Hot air balloon rides","Cultural visits","Photography","Bird watching","Bush walks"],accommodation:"Premium tented camps & safari lodges",bestTime:"July – October (Migration), Year-round",groupSize:"2–8 guests"},{id:"amboseli",name:"Amboseli Explorer",tagline:"In the Shadow of Kilimanjaro",description:"Walk in the footsteps of giants. Amboseli's vast plains stretch endlessly beneath Africa's highest peak, where elephant herds paint silhouettes against a snow-capped horizon.",longDescription:"Amboseli National Park offers one of Africa's most iconic views — large elephant herds crossing the dusty plains with the majestic Mount Kilimanjaro rising dramatically in the background. This is where the air shimmers with heat, where ancient elephants move in timeless processions, and where every photograph becomes a masterpiece painted by nature herself.",duration:"3 Days / 2 Nights",price:"From $980",priceNote:"per person sharing",highlights:["Kilimanjaro views","Large elephant herds","Observation Hill hike","Swamp wildlife viewing","Cultural encounters","Scenic photography"],inclusions:["Park entry fees","Professional guide","Safari vehicle","Full board accommodation","Nairobi transfers","Drinking water"],itinerary:[{day:"Day 1",title:"Journey to Amboseli",description:"Drive through rolling Athi Plains to Amboseli. Afternoon game drive with Kilimanjaro's snow-capped peak as your backdrop."},{day:"Day 2",title:"Full Day Exploration",description:"Dawn and afternoon game drives through marshes and open plains. Visit Observation Hill for panoramic views of the entire park."},{day:"Day 3",title:"Sunrise & Return",description:"A magical sunrise game drive captures elephants silhouetted against Kilimanjaro before returning to Nairobi."}],images:["https://images.pexels.com/photos/19530816/pexels-photo-19530816.jpeg?auto=compre ossing points."},{day:"Day 4",title:"Fly to the Coast",description:"Morning flight from the Mara to the Kenya coast. Arrive at your beach resort by afternoon."},{day:"Days 5-6",title:"Beach Paradise",description:"Snorkeling, dhow sailing, Swahili cultural tours, and pure beach bliss."},{day:"Day 7",title:"Departure",description:"Leisurely morning before your transfer with memories from bush to beach."}],images:["https://images.pexels.com/photos/15994203/pexels-photo-15994203.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=800&w=1200","https://images.pexels.com/photos/33629231/pexels-photo-33629231.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=800&w=1200","https://images.pexels.com/photos/28884379/pexels-photo-28884379.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=800&w=1200","https://images.pexels.com/photos/20501201/pexels-photo-20501201.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=800&w=1200"],activities:["Game drives","Bush walks","Cultural visits","Snorkeling","Dhow sailing","Beach relaxation"],accommodation:"Safari lodge + Beach resort",bestTime:"July – March",groupSize:"2–8 guests"},{id:"migration-special",name:"Great Migration Special",tagline:"Nature's Greatest Spectacle",description:"Join the thundering herds on their ancient journey. The Great Migration is the world's most awe-inspiring wildlife event — and you can be part of it.",longDescription:"Every year, over 1.5 million wildebeest, zebra, and gazelle follow ancient instincts on a 1,200-mile circular journey through the Serengeti-Mara ecosystem. The river crossings of the Mara are among the most dramatic wildlife spectacles on Earth — raw, primal, and utterly unforgettable. This carefully timed safari places you in the heart of the migration, with expert guides who know exactly where nature's greatest show will unfold.",duration:"5 Days / 4 Nights",price:"From $2,100",priceNote:"per person sharing",highlights:["River crossing viewpoints","Migration tracking","Predator-prey encounters","Hot air balloon option","Expert lver ribbon, and the herds begin to stir.`,image:"https://images.pexels.com/photos/15994191/pexels-photo-15994191.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=800&w=1200"},{time:"7:00 AM",title:"Among the Wildlife",description:"The morning light is liquid gold. A pride of lions lounges beneath a lone acacia, their cubs tumbling in the dewy grass. Zebras graze in perfect formation, their stripes shimmering like a living painting. Your safari vehicle moves slowly through the golden grasslands, and suddenly — a cheetah, poised on a termite mound, scanning the plains with laser focus. Your heart pounds.",image:"https://images.pexels.com/photos/20501201/pexels-photo-20501201.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=800&w=1200"},{time:"1:00 PM",title:"Back at Camp",description:"The midday sun bathes the camp in warm light. You settle into a canvas chair on your private deck, cold drink in hand, as the breeze carries the scent of wild sage and warm earth. The lodge is a sanctuary — elegant linens, handcrafted furniture, and the gentle hum of the African bush. Lunch is served under a shaded veranda: fresh salads, grilled meats, and stories shared with fellow travelers.",image:"https://images.pexels.com/photos/17831034/pexels-photo-17831034.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=800&w=1200"},{time:"6:30 PM",title:"Sunset Over the Savannah",description:"The sky catches fire. Crimson, amber, and violet streak across the horizon as the sun descends behind a silhouetted acacia. Your guide parks the vehicle on a hilltop, pours sundowners, and for a moment, the world is still. A campfire crackles nearby as stars begin to emerge, and the sounds of the African night begin their ancient symphony. This is the moment you'll remember forever.",image:"https://images.pexels.com/photos/31848298/pexels-photo-31848298.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=800&w=1200"}],vp=[{name:"Sarah & James",location:"London, UK",text:"We had such a wonderful time in the Mara. Our guide knew exactly
